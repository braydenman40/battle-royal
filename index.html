<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2D Battle Royale - Lobby</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .screen { text-align: center; background: #2a2a2a; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: auto; max-width: 1200px; margin: 0 auto; display: none; }
        .active { display: flex; justify-content: center; align-items: center; flex-direction: column; } /* Only the active screen shows */
        
        h1 { margin-bottom: 30px; color: #00ff88; letter-spacing: 2px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .btn-host { background: #00ff88; color: #1a1a1a; }
        .btn-host:hover { background: #00cc6e; }
        .btn-join { background: #0088ff; color: white; }
        .btn-join:hover { background: #0066cc; }
        
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; text-align: center; font-size: 20px; }
        .code-display { font-size: 48px; font-weight: bold; color: #ffcc00; margin: 20px 0; letter-spacing: 5px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00ff88; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        canvas { width: 100%; border: 2px solid #444; border-radius: 12px; margin: 15px auto; display: block; background: #111; max-width: 1200px; }
        .health-bar { width: 300px; height: 20px; background: #333; border: 1px solid #444; margin-bottom: 10px; position: fixed; top: 10px; left: 10px; z-index: 10; }
        .health-fill { height: 100%; background: #00ff88; transition: width 0.2s; }
        .health-fill { height: 100%; background: #00ff88; transition: width 0.2s; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="home-menu" class="screen active">
        <h1>BATTLE ARENA</h1>
        <button class="btn-host" onclick="showHostPage()">HOST GAME</button>
        <button class="btn-join" onclick="showJoinPage()">JOIN GAME</button>
    </div>

    <div id="join-page" class="screen">
        <h1>JOIN GAME</h1>
        <input type="text" id="roomInput" placeholder="ENTER 4-CHAR CODE" maxlength="4">
        <button class="btn-join" onclick="processJoin()">CONNECT</button>
        <button style="background:transparent; color:#888;" onclick="showHome()">BACK</button>
    </div>

    <div id="lobby-page" class="screen">
        <h1>LOBBY</h1>
        <p>Share this code with friends:</p>
        <div class="code-display" id="generatedCode">----</div>
        <div class="loader"></div>
        <p id="playerCount">Waiting for players to join...</p>
        <button class="btn-host" id="startBtn" style="display:none;" onclick="startGame()">START GAME</button>
        <button style="background:transparent; color:#ff4444;" onclick="showHome()">CANCEL</button>
    </div>

    <div id="game-page" class="screen">
        <h1>BATTLE ROYALE</h1>
        <div class="health-bar"><div id="healthFill" class="health-fill" style="width: 100%;"></div></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <p id="gameStatus" style="position: fixed; bottom: 10px; left: 10px; z-index: 10; margin: 0;">Fight to be the last one standing.</p>
        <div id="playersLeft" style="position: fixed; top: 10px; right: 10px; z-index: 10; color: #00ff88; font-weight: bold; font-size: 18px; text-align: right;">50/50 players left</div>
        <button class="btn-host" style="margin-top: 20px;" onclick="endGame('Game exited.')">EXIT GAME</button>
    </div>

    <script>
        // Function to switch screens
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showHome() { showScreen('home-menu'); }

        function showJoinPage() { showScreen('join-page'); }

        function showHostPage() {
            // 1. Generate a random 4-character code
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('generatedCode').innerText = code;
            document.getElementById('playerCount').innerText = '1 player in lobby. Waiting for more players...';
            document.getElementById('startBtn').style.display = 'block';
            
            // 2. Show the lobby
            showScreen('lobby-page');
            
            // In a real game, you'd tell the server here: socket.emit('createRoom', code);
        }

        function startGame() {
            const roomCode = document.getElementById('generatedCode').innerText;
            document.getElementById('gameStatus').innerText = 'Battle Royale started for room ' + roomCode + '. Use WASD/arrow keys to move, mouse to aim, click to shoot. Survive the storm and enemies!';
            document.getElementById('playerCount').innerText = 'Game in progress...';
            document.querySelector('.loader').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            showScreen('game-page');
            // Set canvas to wider centered view
            const canvas = document.getElementById('gameCanvas');
            canvas.width = 1200;
            canvas.height = 800;
            canvas.style.width = '1200px';
            canvas.style.height = '800px';
            // Hide UI elements
            document.querySelector('#game-page h1').style.display = 'none';
            document.querySelector('#game-page button').style.display = 'none';
            initGame();
        }

        const gameState = {
            worldWidth: 4000,
            worldHeight: 4000,
            camera: { x: 0, y: 0 },
            player: { x: 2000, y: 2000, size: 14, color: '#00ff88', speed: 3.5, alive: true, health: 150, maxHealth: 150, autoShootCooldown: 0 },
            enemies: [],
            bullets: [],
            obstacles: [],
            mouse: { x: 0, y: 0 },
            playing: false,
            frame: 0,            maxPlayers: 50,            safeZone: { x: 2000, y: 2000, radius: 1200 }
        };

        const inputState = { left: false, right: false, up: false, down: false };
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function initGame() {
            gameState.worldWidth = canvas.width * 8;
            gameState.worldHeight = canvas.height * 8;
            gameState.player.x = gameState.worldWidth / 2;
            gameState.player.y = gameState.worldHeight / 2;
            gameState.camera.x = gameState.player.x - canvas.width / 2;
            gameState.camera.y = gameState.player.y - canvas.height / 2;
            gameState.player.alive = true;
            gameState.player.health = 150;
            gameState.enemies = [];
            gameState.bullets = [];
            gameState.obstacles = [];
            gameState.playing = true;
            gameState.frame = 0;
            gameState.safeZone = { x: gameState.worldWidth / 2, y: gameState.worldHeight / 2, radius: 5000 };

            // Add obstacles (walls/buildings)
            for (let i = 0; i < 60; i++) {
                const isBuilding = i < 30;
                gameState.obstacles.push({
                    x: Math.random() * gameState.worldWidth,
                    y: Math.random() * gameState.worldHeight,
                    width: (isBuilding ? 140 + Math.random() * 260 : 50 + Math.random() * 100),
                    height: (isBuilding ? 140 + Math.random() * 260 : 50 + Math.random() * 100),
                    color: isBuilding ? '#3a3a3a' : '#555'
                });
            }

            // Add bots up to the 50 player cap
            const botCount = gameState.maxPlayers - 1;
            for (let i = 0; i < botCount; i++) {
                gameState.enemies.push({
                    id: i,
                    x: Math.random() * gameState.worldWidth,
                    y: Math.random() * gameState.worldHeight,
                    size: 12,
                    color: '#ff4444',
                    dx: Math.random() * 3.5 - 1.75,
                    dy: Math.random() * 3.5 - 1.75,
                    health: 100,
                    maxHealth: 100,
                    lastShot: 0
                });
            }

            requestAnimationFrame(gameTick);
        }

        function gameTick() {
            if (!gameState.playing) return;
            updatePlayer();
            updateEnemies();
            updateBullets();
            updateSafeZone();
            drawGame();
            gameState.frame += 1;
            const aliveEnemies = gameState.enemies.filter(e => e.health > 0).length;
            const alivePlayers = (gameState.player.alive ? 1 : 0) + aliveEnemies;
            document.getElementById('gameStatus').innerText = 'Enemies left: ' + aliveEnemies + ' | Safe zone radius: ' + Math.round(gameState.safeZone.radius) + ' | Click to shoot!';
            document.getElementById('playersLeft').innerText = alivePlayers + '/' + gameState.maxPlayers + ' players left';
            if (aliveEnemies === 0) {
                endGame('Victory! You eliminated all enemies!');
            }
            requestAnimationFrame(gameTick);
        }

        function updatePlayer() {
            if (!gameState.player.alive) return;
            let speed = gameState.player.speed;
            let newX = gameState.player.x;
            let newY = gameState.player.y;
            if (inputState.left) newX -= speed;
            if (inputState.right) newX += speed;
            if (inputState.up) newY -= speed;
            if (inputState.down) newY += speed;

            // Check collision with obstacles
            let canMoveX = true;
            let canMoveY = true;
            gameState.obstacles.forEach(ob => {
                if (rectCircleIntersect(ob, { x: newX, y: gameState.player.y, size: gameState.player.size })) canMoveX = false;
                if (rectCircleIntersect(ob, { x: gameState.player.x, y: newY, size: gameState.player.size })) canMoveY = false;
            });

            if (canMoveX) gameState.player.x = Math.max(gameState.player.size, Math.min(gameState.worldWidth - gameState.player.size, newX));
            if (canMoveY) gameState.player.y = Math.max(gameState.player.size, Math.min(gameState.worldHeight - gameState.player.size, newY));

            // Update camera to follow player
            gameState.camera.x = gameState.player.x - canvas.width / 2;
            gameState.camera.y = gameState.player.y - canvas.height / 2;
            gameState.camera.x = Math.max(0, Math.min(gameState.worldWidth - canvas.width, gameState.camera.x));
            gameState.camera.y = Math.max(0, Math.min(gameState.worldHeight - canvas.height, gameState.camera.y));

            // Check safe zone
            const distToCenter = Math.sqrt((gameState.player.x - gameState.safeZone.x) ** 2 + (gameState.player.y - gameState.safeZone.y) ** 2);
            if (distToCenter > gameState.safeZone.radius) {
                gameState.player.health -= 0.5;
                if (gameState.player.health <= 0) {
                    endGame('You were eliminated by the storm!');
                }
            }

            document.getElementById('healthFill').style.width = (gameState.player.health / gameState.player.maxHealth) * 100 + '%';

            // Auto-shoot at nearby enemies
            if (gameState.player.autoShootCooldown > 0) {
                gameState.player.autoShootCooldown--;
            } else {
                let nearestEnemy = null;
                let minDist = Infinity;
                for (let enemy of gameState.enemies) {
                    if (enemy.health <= 0) continue;
                    const dist = Math.sqrt((enemy.x - gameState.player.x)**2 + (enemy.y - gameState.player.y)**2);
                    if (dist < 10 && dist < minDist) {
                        minDist = dist;
                        nearestEnemy = enemy;
                    }
                }
                if (nearestEnemy) {
                    const angle = Math.atan2(nearestEnemy.y - gameState.player.y, nearestEnemy.x - gameState.player.x);
                    gameState.bullets.push({
                        x: gameState.player.x,
                        y: gameState.player.y,
                        dx: Math.cos(angle) * 12,
                        dy: Math.sin(angle) * 12,
                        color: '#00ff88',
                        size: 4,
                        owner: 'player'
                    });
                    gameState.player.autoShootCooldown = 10; // 30 frames cooldown
                }
            }
        }

        function updateEnemies() {
            gameState.enemies.forEach((enemy, index) => {
                if (enemy.health <= 0) return;
                enemy.x += enemy.dx;
                enemy.y += enemy.dy;
                if (enemy.x < enemy.size || enemy.x > gameState.worldWidth - enemy.size) enemy.dx *= -1;
                if (enemy.y < enemy.size || enemy.y > gameState.worldHeight - enemy.size) enemy.dy *= -1;
                if (Math.random() < 0.01) {
                    enemy.dx = Math.random() * 3.5 - 1.75;
                    enemy.dy = Math.random() * 3.5 - 1.75;
                }

                // Check collision with player
                if (circleIntersect(gameState.player, enemy)) {
                    gameState.player.health -= 10;
                    if (gameState.player.health <= 0) {
                        endGame('You were eliminated!');
                    }
                }

                // Enemy shooting
                if (gameState.frame - enemy.lastShot > 40 && Math.random() < 0.02) {
                    const target = getEnemyTarget(enemy);
                    if (target) {
                        const angle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
                        gameState.bullets.push({
                            x: enemy.x,
                            y: enemy.y,
                            dx: Math.cos(angle) * 10,
                            dy: Math.sin(angle) * 10,
                            color: '#ff4444',
                            size: 3,
                            owner: 'enemy',
                            ownerId: enemy.id
                        });
                        enemy.lastShot = gameState.frame;
                    }
                }
            });
        }

        function getEnemyTarget(enemy) {
            const targets = [];
            if (gameState.player.alive) targets.push(gameState.player);
            gameState.enemies.forEach(other => {
                if (other !== enemy && other.health > 0) targets.push(other);
            });

            let nearest = null;
            let nearestDist = Infinity;
            targets.forEach(target => {
                const dist = Math.hypot(target.x - enemy.x, target.y - enemy.y);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearest = target;
                }
            });
            return nearestDist <= 800 ? nearest : null;
        }

        function updateBullets() {
            gameState.bullets.forEach((bullet, index) => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;

                // Remove if out of world bounds
                if (bullet.x < 0 || bullet.x > gameState.worldWidth || bullet.y < 0 || bullet.y > gameState.worldHeight) {
                    gameState.bullets.splice(index, 1);
                    return;
                }

                // Check collision with player
                if (bullet.owner === 'enemy' && circleIntersect(gameState.player, bullet)) {
                    gameState.player.health -= 20;
                    gameState.bullets.splice(index, 1);
                    if (gameState.player.health <= 0) {
                        endGame('You were shot!');
                    }
                    return;
                }

                // Check collision with enemies
                let bulletRemoved = false;
                if (bullet.owner === 'player') {
                    gameState.enemies.forEach((enemy, eIndex) => {
                        if (bulletRemoved) return;
                        if (circleIntersect(enemy, bullet)) {
                            enemy.health -= 25;
                            gameState.bullets.splice(index, 1);
                            bulletRemoved = true;
                            if (enemy.health <= 0) {
                                gameState.enemies.splice(eIndex, 1);
                            }
                        }
                    });
                } else if (bullet.owner === 'enemy') {
                    gameState.enemies.forEach((enemy, eIndex) => {
                        if (bulletRemoved) return;
                        if (enemy.id === bullet.ownerId) return;
                        if (circleIntersect(enemy, bullet)) {
                            enemy.health -= 20;
                            gameState.bullets.splice(index, 1);
                            bulletRemoved = true;
                            if (enemy.health <= 0) {
                                gameState.enemies.splice(eIndex, 1);
                            }
                        }
                    });
                }
                if (bulletRemoved) return;

                // Check collision with obstacles
                gameState.obstacles.forEach(ob => {
                    if (rectCircleIntersect(ob, bullet)) {
                        gameState.bullets.splice(index, 1);
                        return;
                    }
                });
            });
        }

        function updateSafeZone() {
            if (gameState.frame % 300 === 0 && gameState.safeZone.radius > 50) {
                gameState.safeZone.radius -= 20;
            }
        }

        function circleIntersect(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < a.size + b.size;
        }

        function rectCircleIntersect(rect, circle) {
            const distX = Math.abs(circle.x - rect.x - rect.width / 2);
            const distY = Math.abs(circle.y - rect.y - rect.height / 2);
            if (distX > (rect.width / 2 + circle.size)) return false;
            if (distY > (rect.height / 2 + circle.size)) return false;
            if (distX <= (rect.width / 2)) return true;
            if (distY <= (rect.height / 2)) return true;
            const dx = distX - rect.width / 2;
            const dy = distY - rect.height / 2;
            return (dx * dx + dy * dy) <= (circle.size * circle.size);
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-gameState.camera.x, -gameState.camera.y);

            // Draw grass background with texture
            ctx.fillStyle = '#0d3d0d';
            ctx.fillRect(gameState.camera.x, gameState.camera.y, canvas.width + 100, canvas.height + 100);
            
            // Draw grass texture with varied colors
            const grassColors = ['#2d8c2d', '#3a9a3a', '#4cb84c', '#228822'];
            const cellSize = 12;
            for (let gx = Math.floor(gameState.camera.x / cellSize) * cellSize; gx < gameState.camera.x + canvas.width + cellSize; gx += cellSize) {
                for (let gy = Math.floor(gameState.camera.y / cellSize) * cellSize; gy < gameState.camera.y + canvas.height + cellSize; gy += cellSize) {
                    const colorIdx = (Math.floor(gx / cellSize) + Math.floor(gy / cellSize)) % grassColors.length;
                    ctx.fillStyle = grassColors[colorIdx];
                    ctx.fillRect(gx, gy, cellSize, cellSize);
                }
            }

            // Draw safe zone
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(gameState.safeZone.x, gameState.safeZone.y, gameState.safeZone.radius, 0, Math.PI * 2);
            ctx.stroke();

            // Draw obstacles
            gameState.obstacles.forEach(ob => {
                ctx.fillStyle = ob.color;
                ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
            });

            // Draw bullets
            gameState.bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw enemies
            gameState.enemies.forEach(enemy => {
                if (enemy.health > 0) {
                    drawCircle(enemy);
                    // Draw gun towards player
                    const angle = Math.atan2(gameState.player.y - enemy.y, gameState.player.x - enemy.x);
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y);
                    ctx.lineTo(enemy.x + Math.cos(angle) * 20, enemy.y + Math.sin(angle) * 20);
                    ctx.stroke();
                }
            });

            // Draw player
            if (gameState.player.alive) {
                drawCircle(gameState.player);
                // Draw gun towards mouse
                const angle = Math.atan2(gameState.mouse.y + gameState.camera.y - gameState.player.y, gameState.mouse.x + gameState.camera.x - gameState.player.x);
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(gameState.player.x, gameState.player.y);
                ctx.lineTo(gameState.player.x + Math.cos(angle) * 25, gameState.player.y + Math.sin(angle) * 25);
                ctx.stroke();
            }

            ctx.restore();

            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 5;
            ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
        }

        function drawCircle(entity) {
            ctx.fillStyle = entity.color;
            ctx.beginPath();
            ctx.arc(entity.x, entity.y, entity.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function endGame(message) {
            gameState.playing = false;
            document.getElementById('gameStatus').innerText = message;
        }

        window.addEventListener('keydown', event => {
            if (event.key === 'ArrowLeft' || event.key === 'a') inputState.left = true;
            if (event.key === 'ArrowRight' || event.key === 'd') inputState.right = true;
            if (event.key === 'ArrowUp' || event.key === 'w') inputState.up = true;
            if (event.key === 'ArrowDown' || event.key === 's') inputState.down = true;
        });

        window.addEventListener('keyup', event => {
            if (event.key === 'ArrowLeft' || event.key === 'a') inputState.left = false;
            if (event.key === 'ArrowRight' || event.key === 'd') inputState.right = false;
            if (event.key === 'ArrowUp' || event.key === 'w') inputState.up = false;
            if (event.key === 'ArrowDown' || event.key === 's') inputState.down = false;
        });

        canvas.addEventListener('mousemove', event => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            gameState.mouse.x = (event.clientX - rect.left) * scaleX;
            gameState.mouse.y = (event.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('click', event => {
            if (!gameState.playing || !gameState.player.alive) return;
            const worldMouseX = gameState.mouse.x + gameState.camera.x;
            const worldMouseY = gameState.mouse.y + gameState.camera.y;
            const angle = Math.atan2(worldMouseY - gameState.player.y, worldMouseX - gameState.player.x);
            gameState.bullets.push({
                x: gameState.player.x,
                y: gameState.player.y,
                dx: Math.cos(angle) * 7,
                dy: Math.sin(angle) * 7,
                color: '#00ff88',
                size: 4,
                owner: 'player'
            });
        });

        function processJoin() {
            const input = document.getElementById('roomInput').value.toUpperCase();
            if (input.length === 4) {
                alert("Searching for room: " + input);
                // In a real game, you'd check the server here: socket.emit('joinRoom', input);
            } else {
                alert("Please enter a 4-character code.");
            }
        }
    </script>
</body>
</html>
